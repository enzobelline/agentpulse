name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-build-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}
          restore-keys: |
            swift-build-${{ runner.os }}-

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

  install-smoke-test:
    runs-on: macos-15
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-build-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}
          restore-keys: |
            swift-build-${{ runner.os }}-

      - name: Run install.sh (non-interactive)
        run: |
          chmod +x install.sh run_update_status.sh update_status.py uninstall.sh
          echo "n" | ./install.sh

      - name: Verify binary exists
        run: test -f .build/release/AgentPulse

      - name: Verify LaunchAgent was created
        run: test -f ~/Library/LaunchAgents/com.agentpulse.menubar.plist

      - name: Verify hooks were configured
        run: grep -q "run_update_status.sh" ~/.claude/settings.json

      - name: Verify AgentPulse is running
        run: pgrep -f AgentPulse

      - name: Clean up
        if: always()
        run: |
          launchctl unload ~/Library/LaunchAgents/com.agentpulse.menubar.plist 2>/dev/null || true
          pkill -f AgentPulse 2>/dev/null || true
